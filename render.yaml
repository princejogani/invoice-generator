services:
  - type: web
    name: invoice-saas-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: STEPFUN_API_KEY
        sync: false
      - key: STEPFUN_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: STEPFUN_MODEL
        value: stepfun/step-3.5-flash:free
      - key: ENABLE_BACKGROUND_AGENTS
        value: false
